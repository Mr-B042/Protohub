<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Protohub — Order & Inventory Management</title>
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />
    <script>
      (() => {
        let href = "/manifest.json";
        try {
          const rawUser = localStorage.getItem("protohub.authUser");
          const rawName = localStorage.getItem("protohub.companyName") || "Protohub";
          const rawLogo = localStorage.getItem("protohub.companyLogo") || "";
          const user = rawUser ? JSON.parse(rawUser) : null;
          if (user?.orgId) {
            const version = `${rawName.trim().length}-${rawLogo.trim().length}`;
            href = `/org-manifest.webmanifest?orgId=${encodeURIComponent(user.orgId)}&v=${encodeURIComponent(version)}`;
          }
        } catch {}
        const link = document.createElement("link");
        link.rel = "manifest";
        link.href = href;
        document.head.appendChild(link);
      })();
    </script>
    <script>
      // Apply the saved theme to <html> BEFORE first paint, so both the
      // splash and the app's first render are in the right mode (no
      // light→dark flash). Mirrors App.tsx: stored protohub.theme wins,
      // else the OS preference.
      (() => {
        try {
          var stored = localStorage.getItem("protohub.theme");
          var dark = stored === "dark" || (stored !== "light" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", !!dark);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
    <meta name="theme-color" content="#1F8FE0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <!-- First-paint splash: shows instantly (before the JS bundle loads) so
         users on slow networks see a branded loader instead of a blank white
         screen. main.tsx fades it out the moment React mounts. Brand-aware:
         uses the org's saved name/logo from localStorage when available. -->
    <div id="app-splash" aria-hidden="true">
      <div class="app-splash__inner">
        <div id="app-splash-brand" class="app-splash__brand">Protohub</div>
        <div class="app-splash__spinner"></div>
      </div>
    </div>
    <style>
      #app-splash {
        position: fixed; inset: 0; z-index: 2147483647;
        display: grid; place-items: center;
        background: #ffffff;
        transition: opacity 0.35s ease;
        font-family: Inter, system-ui, -apple-system, sans-serif;
      }
      #app-splash.app-splash--hide { opacity: 0; pointer-events: none; }
      .app-splash__inner { display: flex; flex-direction: column; align-items: center; gap: 22px; }
      .app-splash__brand {
        font-size: 26px; font-weight: 800; letter-spacing: -0.02em; color: #0f172a;
        max-width: 70vw; text-align: center; line-height: 1.2;
      }
      #app-splash img.app-splash__logo { width: 84px; height: 84px; object-fit: contain; border-radius: 18px; }
      .app-splash__spinner {
        width: 34px; height: 34px; border-radius: 50%;
        border: 3px solid #e2e8f0; border-top-color: #1F8FE0;
        animation: app-splash-spin 0.7s linear infinite;
      }
      @keyframes app-splash-spin { to { transform: rotate(360deg); } }
      /* Match the app's actual theme (set on <html> before paint), not just
         the OS preference — so a dark-mode user on a light-OS phone doesn't
         get a white flash before the dark app loads. */
      html.dark #app-splash { background: #0f1822; }
      html.dark .app-splash__brand { color: #f1f5f9; }
      html.dark .app-splash__spinner { border-color: #1e293b; border-top-color: #1F8FE0; }
    </style>
    <script>
      // Brand the splash from the org's saved name/logo. These are stored
      // JSON-encoded by the app's writeStored helper, so the raw localStorage
      // value has surrounding quotes — JSON.parse it (a literal quoted URL
      // would otherwise become a broken <img src>). Falls back gracefully.
      (() => {
        var readStored = function (key) {
          try {
            var raw = localStorage.getItem(key);
            if (raw == null) return "";
            try { var v = JSON.parse(raw); return typeof v === "string" ? v : ""; }
            catch (e) { return raw; }
          } catch (e) { return ""; }
        };
        try {
          var name = readStored("protohub.companyName").trim();
          var logo = readStored("protohub.companyLogo").trim();
          var brand = document.getElementById("app-splash-brand");
          if (logo) {
            var img = document.createElement("img");
            img.className = "app-splash__logo";
            img.alt = name || "Loading";
            // If the logo URL fails to load (stale/dead link), fall back to
            // the brand name so we never show a broken-image icon.
            img.onerror = function () {
              var span = document.createElement("div");
              span.className = "app-splash__brand";
              span.textContent = name || "Protohub";
              img.replaceWith(span);
            };
            img.src = logo;
            brand.replaceWith(img);
          } else if (name) {
            brand.textContent = name;
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for push notifications + auto-update.
      // Localhost should never be controlled by an old production/dev SW, because
      // it can serve stale UI while Vite is running the correct code.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          const isLocalhost = ["localhost", "127.0.0.1", "0.0.0.0", "::1"].includes(window.location.hostname);
          if (isLocalhost) {
            Promise.all([
              navigator.serviceWorker.getRegistrations().then((regs) => Promise.all(regs.map((reg) => reg.unregister()))),
              "caches" in window ? caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key)))) : Promise.resolve()
            ]).then(() => {
              if (navigator.serviceWorker.controller && sessionStorage.getItem("protohub.localSwCleared") !== "1") {
                sessionStorage.setItem("protohub.localSwCleared", "1");
                window.location.reload();
              }
            }).catch((err) => console.warn("[SW] localhost cleanup failed:", err));
            return;
          }

          navigator.serviceWorker.register("/sw.js")
            .then((reg) => {
              console.log("[SW] registered, scope:", reg.scope);

              // Detect new SW: when one's installed and waiting, force a reload
              // so users always get the latest JS bundle without manual cache-clear.
              reg.addEventListener("updatefound", () => {
                const newWorker = reg.installing;
                if (!newWorker) return;
                newWorker.addEventListener("statechange", () => {
                  if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                    console.log("[SW] new version installed — reloading");
                    window.location.reload();
                  }
                });
              });

              // Check for updates every 5 minutes (not 60) so deploys propagate fast
              setInterval(() => reg.update(), 5 * 60 * 1000);
              // Also check on focus (tab/app becomes active)
              window.addEventListener("focus", () => reg.update());
            })
            .catch((err) => console.warn("[SW] registration failed:", err));

          // Reload when SW takes control (covers the "first install" case)
          let refreshing = false;
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
        });
      }
    </script>
  </body>
</html>
