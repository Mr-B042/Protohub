<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Protohub — Order & Inventory Management</title>
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />
    <script>
      (() => {
        let href = "/manifest.json";
        try {
          const rawUser = localStorage.getItem("protohub.authUser");
          const rawName = localStorage.getItem("protohub.companyName") || "Protohub";
          const rawLogo = localStorage.getItem("protohub.companyLogo") || "";
          const user = rawUser ? JSON.parse(rawUser) : null;
          if (user?.orgId) {
            const version = `${rawName.trim().length}-${rawLogo.trim().length}`;
            href = `/org-manifest.webmanifest?orgId=${encodeURIComponent(user.orgId)}&v=${encodeURIComponent(version)}`;
          }
        } catch {}
        const link = document.createElement("link");
        link.rel = "manifest";
        link.href = href;
        document.head.appendChild(link);
      })();
    </script>
    <meta name="theme-color" content="#1F8FE0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for push notifications + auto-update
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((reg) => {
              console.log("[SW] registered, scope:", reg.scope);

              // Detect new SW: when one's installed and waiting, force a reload
              // so users always get the latest JS bundle without manual cache-clear.
              reg.addEventListener("updatefound", () => {
                const newWorker = reg.installing;
                if (!newWorker) return;
                newWorker.addEventListener("statechange", () => {
                  if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                    console.log("[SW] new version installed — reloading");
                    window.location.reload();
                  }
                });
              });

              // Check for updates every 5 minutes (not 60) so deploys propagate fast
              setInterval(() => reg.update(), 5 * 60 * 1000);
              // Also check on focus (tab/app becomes active)
              window.addEventListener("focus", () => reg.update());
            })
            .catch((err) => console.warn("[SW] registration failed:", err));

          // Reload when SW takes control (covers the "first install" case)
          let refreshing = false;
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
        });
      }
    </script>
  </body>
</html>
